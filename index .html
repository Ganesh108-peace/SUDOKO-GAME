<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sudoku Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <div id="app">
    <header>
      <h1>SUDOKU</h1>
      <p class="tagline">Logic. Patience. Victory.</p>
    </header>

    <div class="controls">
      <select id="diff">
        <option value="beginner">Beginner</option>
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button class="btn primary" onclick="newGame()">New Game</button>
      <button class="btn" onclick="checkBoard()">Check</button>
      <button class="btn" onclick="solve()">Solve</button>
      <button class="btn danger" onclick="clearSelected()">Clear</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Time</div>
        <div class="stat-val" id="timer">00:00</div>
      </div>
      <div class="stat">
        <div class="stat-label">Mistakes</div>
        <div class="stat-val" id="mistakes">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Score</div>
        <div class="stat-val" id="score">0</div>
      </div>
    </div>

    <div class="msg" id="msg"></div>

    <div id="board"></div>

    <div class="numpad" id="numpad"></div>

    <div class="leaderboard-section">
      <h2>Leaderboard <span class="db-badge">localStorage DB</span></h2>
      <div id="leaderboard"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
